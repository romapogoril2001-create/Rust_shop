<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rust Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f1012;
            --card-gray: #1c1e22;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 100px; /* Місце під кнопку */
        }

        .header {
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0 20px 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-gray);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 18px;
            background: #131416;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 14px;
            margin: 5px 0;
            font-weight: 600;
        }

        .price {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .btn-add {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-add:active {
            transform: scale(0.96);
        }

        /* Кнопка кошика як в Evo Shop */
        .cart-float {
            position: fixed;
            bottom: 25px;
            left: 15px;
            right: 15px;
            background: var(--accent-blue);
            color: white;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            display: none; /* З'явиться при додаванні */
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="header">Скіни Rust</div>

    <div class="grid">
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/rifle.ak.polymer_512.png" alt="AK-47">
            <h3>AK-47 Polymer</h3>
            <div class="price">1500 грн</div>
            <button class="btn-add" onclick="addItem('AK-47 Polymer', 1500)">До кошика</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/mask.balaclava_512.png" alt="Frog">
            <h3>Frog Mask Set</h3>
            <div class="price">350 грн</div>
            <button class="btn-add" onclick="addItem('Frog Mask Set', 350)">До кошика</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/rifle.thompson_512.png" alt="Thompson">
            <h3>Thompson</h3>
            <div class="price">700 грн</div>
            <button class="btn-add" onclick="addItem('Thompson', 700)">До кошика</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/metal.facemask_512.png" alt="Mask">
            <h3>Metal Facemask</h3>
            <div class="price">950 грн</div>
            <button class="btn-add" onclick="addItem('Metal Facemask', 950)">До кошика</button>
        </div>
    </div>

    <div id="cart-btn" class="cart-float" onclick="finishOrder()">
        ПЕРЕГЛЯНУТИ КОШИК (<span id="cart-count">0</span>)
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f1012');

        let cart = [];

        function addItem(name, price) {
            cart.push({name, price});
            
            // Оновлюємо кнопку кошика
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-btn').style.display = 'block';
            
            // Вібрація (якщо на телефоні)
            tg.HapticFeedback.impactOccurred('medium');
        }

        function finishOrder() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            tg.showConfirm(`Оформити замовлення на ${total} грн?`, (confirm) => {
                if (confirm) {
                    tg.sendData(JSON.stringify({items: cart, total: total}));
                }
            });
        }
    </script>
</body>
</html>
