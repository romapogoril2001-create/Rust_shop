<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rust Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f1012;
            --card-gray: #1c1e22;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-gray: #9ca3af;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 100px;
        }

        .header { font-size: 20px; font-weight: 800; margin: 10px 0 15px 5px; }
        
        /* СІТКА У ДВА РЯДИ */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Робимо 2 колонки */
            gap: 10px; 
        }

        /* КОМПАКТНА КАРТКА */
        .product-card {
            background: var(--card-gray);
            border-radius: 16px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* МАЛЕНЬКЕ ПРЕВ'Ю СЕТУ */
        .set-preview {
            background: #e9e9e9;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            margin-bottom: 8px;
        }

        .set-title {
            color: #000;
            font-size: 10px; /* Дуже дрібний шрифт для назви в рамці */
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: lowercase;
        }

        .set-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .set-icons-grid img {
            width: 100%;
            aspect-ratio: 1/1;
        }

        /* ОДИНОЧНЕ ФОТО (Білий сет) */
        .single-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 12px;
            background: #131416;
            margin-bottom: 8px;
        }

        .price { font-size: 15px; font-weight: 800; margin: 5px 0 2px 0; }
        .item-name { font-size: 13px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .category { color: var(--text-gray); font-size: 10px; margin-bottom: 10px; }

        .btn-add {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background: var(--accent-blue);
            padding: 15px;
            border-radius: 15px;
            display: none;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">Скіни Rust</div>

    <div class="grid">
        
        <div class="product-card">
            <img src="https://raw.githubusercontent.com/romapogoril2001-create/Rust_shop/main/1776364638410.png" class="single-img">
            <p class="price">500 грн.</p>
            <p class="item-name">Білий сет</p>
            <p class="category">Сети скінів</p>
            <button class="btn-add" onclick="addItem('Білий сет', 500)">До кошика</button>
        </div>

        <div class="product-card">
            <div class="set-preview">
                <h2 class="set-title">лісовий кофейний</h2>
                <div class="set-icons-grid">
                    <img src="https://files.facepunch.com/rust/item/pants.camo_512.png">
                    <img src="https://files.facepunch.com/rust/item/hoodie.camo_512.png">
                    <img src="https://files.facepunch.com/rust/item/jacket.camo_512.png">
                    <img src="https://files.facepunch.com/rust/item/mask.balaclava_512.png">
                    <img src="https://files.facepunch.com/rust/item/boots.camo_512.png">
                    <img src="https://files.facepunch.com/rust/item/gloves.camo_512.png">
                </div>
            </div>
            <p class="price">260 грн.</p>
            <p class="item-name">Кофейний сет</p>
            <p class="category">Сети скінів</p>
            <button class="btn-add" onclick="addItem('Кофейний сет', 260)">До кошика</button>
        </div>

    </div>

    <div id="cart-btn" class="cart-bar" onclick="checkout()">
        ПЕРЕГЛЯНУТИ КОШИК (<span id="count">0</span>)
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function addItem(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
            document.getElementById('cart-btn').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function checkout() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            tg.showConfirm(`Сума: ${total} грн. Оформити?`, (ok) => {
                if (ok) {
                    tg.sendData(JSON.stringify(cart));
                }
            });
        }
    </script>
</body>
</html>
