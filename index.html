<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Evo Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f1012;
            --card-gray: #1c1e22;
            --accent-blue: #3b82f6;
            --main-green: #22c55e;
            --text-main: #ffffff;
            --text-gray: #9ca3af;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 120px;
        }

        .header { font-size: 24px; font-weight: 800; margin-bottom: 20px; text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .card {
            background: var(--card-gray);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; border-radius: 15px; background: #131416; margin-bottom: 10px; }
        .price { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

        .btn-add {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background: var(--accent-blue);
            padding: 16px;
            border-radius: 18px;
            display: none;
            justify-content: center;
            z-index: 100;
            font-weight: 800;
        }

        /* Модальне вікно оплати */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20 (px);
            box-sizing: border-box;
        }

        .payment-card {
            background: var(--card-gray);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-number {
            background: #131416;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 1px;
        }

        /* КНОПКА ПО ЦЕНТРУ */
        .btn-manager {
            background: var(--main-green);
            color: white;
            border: none;
            padding: 14px;
            width: 85%;
            border-radius: 12px;
            font-weight: 700;
            margin: 15px auto; /* Центрування */
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-gray);
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">Скіни Rust</div>

    <div class="grid">
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/hoodie.bee_512.png" alt="Сет бджілки">
            <h3>Сет бджілки</h3>
            <div class="price">790 грн</div>
            <button class="btn-add" onclick="addItem('Сет бджілки', 790)">До кошика</button>
        </div>
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/mask.balaclava_512.png" alt="Сет жабки">
            <h3>Сет жабки</h3>
            <div class="price">300 грн</div>
            <button class="btn-add" onclick="addItem('Сет жабки', 300)">До кошика</button>
        </div>
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/wood.armor.jacket_512.png" alt="Кофейний сет сонечка">
            <h3>Кофейний сет сонечка</h3>
            <div class="price">520 грн</div>
            <button class="btn-add" onclick="addItem('Кофейний сет сонечка', 520)">До кошика</button>
        </div>
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/metal.facemask_512.png" alt="МВК Сет сонечка">
            <h3>МВК Сет сонечка</h3>
            <div class="price">640 грн</div>
            <button class="btn-add" onclick="addItem('МВК Сет сонечка', 640)">До кошика</button>
        </div>
    </div>

    <div id="cart-btn" class="cart-bar" onclick="showConfirmOrder()">
        ПЕРЕГЛЯНУТИ КОШИК (<span id="count">0</span>)
    </div>

    <div id="payment-modal">
        <div class="payment-card">
            <h2 style="margin: 0 0 10px 0;">Оплата</h2>
            <p style="color: var(--text-gray); font-size: 14px;">Перекажіть суму на карту:</p>
            
            <div class="card-number">4441 1100 8094 2150</div>
            
            <p id="final-price" style="font-weight: 800; font-size: 20px; margin: 10px 0;"></p>
            
            <p style="font-size: 11px; color: var(--text-gray); margin-bottom: 5px;">Після оплати надішліть чек менеджеру:</p>
            
            <a href="https://t.me/roma_r3343" class="btn-manager">Надіслати чек</a>
            
            <button onclick="closeModal()" class="btn-back">Назад</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function addItem(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
            document.getElementById('cart-btn').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function showConfirmOrder() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            tg.showConfirm(`Оформити замовлення на ${total} грн?`, (ok) => {
                if (ok) {
                    showPayment(total);
                }
            });
        }

        function showPayment(total) {
            document.getElementById('final-price').innerText = `Сума: ${total} грн`;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
        }
    </script>
</body>
</html>
