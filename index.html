<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rust Skin Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f1012;
            --card-bg: #1c1e22;
            --main-color: #3b82f6;
            --text-color: #ffffff;
            --secondary-text: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            padding-bottom: 100px;
            -webkit-user-select: none;
        }

        .header {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 14px;
            background: #131416;
            margin-bottom: 8px;
        }

        .card h3 {
            font-size: 14px;
            margin: 4px 0;
            font-weight: 600;
            height: 34px;
            overflow: hidden;
        }

        .price {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin: 8px 0;
        }

        .btn-add {
            background: var(--main-color);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.1s;
        }

        .btn-add:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Кнопка Кошика */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: var(--main-color);
            color: white;
            padding: 16px;
            border-radius: 18px;
            text-align: center;
            font-weight: 700;
            display: none;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">Скіни Rust</div>

    <div class="grid">
        <div class="card">
            <img src="https://files.facepunch.com/rust/item/rifle.ak.polymer_512.png" alt="AK-47 Polymer">
            <h3>AK-47 | Polymer</h3>
            <div class="price">1500 грн</div>
            <button class="btn-add" onclick="addToCart('AK-47 Polymer', 1500)">В кошик</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/mask.balaclava_512.png" alt="Сет Жабки">
            <h3>Frog Mask Set</h3>
            <div class="price">320 грн</div>
            <button class="btn-add" onclick="addToCart('Frog Mask Set', 320)">В кошик</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/rifle.thompson_512.png" alt="Thompson">
            <h3>Thompson</h3>
            <div class="price">650 грн</div>
            <button class="btn-add" onclick="addToCart('Thompson', 650)">В кошик</button>
        </div>

        <div class="card">
            <img src="https://files.facepunch.com/rust/item/metal.facemask_512.png" alt="Metal Mask">
            <h3>Metal Facemask</h3>
            <div class="price">890 грн</div>
            <button class="btn-add" onclick="addToCart('Metal Mask', 890)">В кошик</button>
        </div>
    </div>

    <div id="cart-bar" class="cart-bar" onclick="sendOrder()">
        Переглянути кошик (<span id="count">0</span>)
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо на весь екран

        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            
            // Оновлюємо лічильник
            document.getElementById('count').innerText = cart.length;
            document.getElementById('cart-bar').style.display = 'block';
            
            // Вібровідгук
            tg.HapticFeedback.impactOccurred('medium');
        }

        function sendOrder() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let itemsList = cart.map(i => i.name).join(", ");

            tg.showConfirm(`Оформити замовлення: ${itemsList} на суму ${total} грн?`, (ok) => {
                if (ok) {
                    // Відправка даних боту
                    tg.sendData(JSON.stringify({
                        items: cart,
                        totalPrice: total
                    }));
                }
            });
        }
        
        // Встановлюємо колір шапки додатка під дизайн
        tg.setHeaderColor('#0f1012');
        tg.setBackgroundColor('#0f1012');
    </script>
</body>
</html>
